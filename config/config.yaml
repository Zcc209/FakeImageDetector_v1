# config.yaml
system:
  max_image_size: 1920
  log_level: "INFO"
  output_dir: "outputs"

quality_gate:
  min_width: 150
  min_height: 150
  min_blur_score: 80.0
  min_brightness: 30.0
  max_brightness: 240.0
  max_blockiness_ratio: 1.8
  enable_compression_check: true

vision_b:
  trufor_threshold: 0.5
  yolo_conf: 0.25

content_c:
  gemini_model: "gemini-1.5-flash"
  ocr_lang: "ch"
